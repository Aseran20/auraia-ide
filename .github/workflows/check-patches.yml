name: Check Patches

on:
  push:
    paths:
      - 'patches/**'
      - 'upstream/stable.json'
  pull_request:
    paths:
      - 'patches/**'
      - 'upstream/stable.json'

jobs:
  check:
    name: Verify patches apply to upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Check patches
        run: bash check-patches.sh
